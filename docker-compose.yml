version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    volumes:
      - mongo-data:/data/db
    networks:
      - mern-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    networks:
      - mern-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      PORT: 5000
      NODE_ENV: development
      MONGO_URI: mongodb://mongodb:27017/mernstore
      UPSTASH_REDIS_URL: redis://redis:6379
      ACCESS_TOKEN_SECRET: access_token_secret_key_123
      REFRESH_TOKEN_SECRET: refresh_token_secret_key_456
      CLIENT_URL: http://localhost:80
      STRIPE_SECRET_KEY: your_stripe_key
      CLOUDINARY_CLOUD_NAME: your_cloud_name
      CLOUDINARY_API_KEY: your_api_key
      CLOUDINARY_API_SECRET: your_api_secret
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mern-network

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - mern-network

networks:
  mern-network:
    driver: bridge

volumes:
  mongo-data:
  redis-data:
